<div style="background:#f0f2f5; min-height:100vh;">
  <nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container">
      <a class="navbar-brand">👥 Groups</a>
      <button class="btn btn-light btn-sm" (click)="goHome()">Back to Home</button>
    </div>
  </nav>

  <div class="container" style="max-width:680px;">
    <div *ngFor="let group of groups" class="card mb-3 p-3">
      <div class="d-flex align-items-center">
        <div class="rounded-circle bg-primary text-white d-flex
          align-items-center justify-content-center me-3"
          style="width:50px;height:50px;font-size:1.3rem;">
          👥
        </div>
        <div class="flex-grow-1">
          <strong>{{ group.name }}</strong>
          <div class="text-muted" style="font-size:0.85rem;">{{ group.description }}</div>
          <small class="text-muted">{{ group.memberCount }} members</small>
        </div>
        <button class="btn btn-outline-primary btn-sm"
          (click)="joinGroup(group.groupId)">
          Join / Leave
        </button>
      </div>
    </div>

    <div *ngIf="groups.length === 0" class="text-center text-muted mt-4">
      <h5>No groups yet 😕</h5>
      <p>Ask admin to create some groups!</p>
    </div>
  </div>
</div>
