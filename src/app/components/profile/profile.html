<div class="container mt-4">
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary mb-4 rounded">
    <div class="container-fluid">
      <a class="navbar-brand">👤 My Profile</a>
      <button class="btn btn-light" (click)="goHome()">Back to Home</button>
    </div>
  </nav>

  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card shadow text-center p-4">
        <div class="mb-3">
          <div class="rounded-circle bg-primary text-white d-inline-flex
            align-items-center justify-content-center"
            style="width:80px; height:80px; font-size:2rem;">
            {{ username.charAt(0).toUpperCase() }}
          </div>
        </div>
        <h3>{{ username }}</h3>
        <p class="text-muted">{{ email }}</p>
        <span class="badge bg-primary">{{ role }}</span>
        <hr/>
        <div class="row text-center mt-2">
          <div class="col">
            <h5>{{ postCount }}</h5>
            <small class="text-muted">Posts</small>
          </div>
        </div>
        <hr/>
        <button class="btn btn-danger w-100 mt-2" (click)="logout()">
          Logout
        </button>
      </div>
    </div>
  </div>
</div>
