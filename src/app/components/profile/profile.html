<div style="background:#f0f2f5; min-height:100vh;">
  <nav class="navbar navbar-dark bg-primary mb-4">
    <div class="container">
      <a class="navbar-brand">👤 My Profile</a>
      <button class="btn btn-light btn-sm" (click)="goHome()">Back to Home</button>
    </div>
  </nav>

  <div class="container" style="max-width:500px;">
    <div class="card p-4 text-center">

      <!-- Profile Picture -->
      <div class="mb-3 mx-auto">
        <img *ngIf="profileImage"
          [src]="'https://localhost:7193' + profileImage"
          class="rounded-circle"
          style="width:120px; height:120px; object-fit:cover; border:4px solid #1877f2;"/>
        <div *ngIf="!profileImage"
          class="rounded-circle bg-primary text-white d-flex
          align-items-center justify-content-center mx-auto"
          style="width:120px; height:120px; font-size:3rem; font-weight:700;">
          {{ username ? username.charAt(0).toUpperCase() : '?' }}
        </div>
      </div>

      <!-- Upload Button -->
      <div class="mb-3">
        <label class="btn btn-outline-primary btn-sm" style="cursor:pointer;">
          📷 Change Photo
          <input type="file" hidden accept="image/*"
            (change)="onProfilePicSelected($event)"/>
        </label>
      </div>

      <h4 class="fw-bold mb-1">{{ username || 'Loading...' }}</h4>
      <p class="text-muted mb-1">{{ email }}</p>
      <span class="badge mb-3" style="background:#1877f2;">{{ role }}</span>
      <div class="text-muted mb-3" style="font-size:0.85rem;">
        Joined: {{ joinedAt | date:'mediumDate' }}
      </div>

      <hr/>
      <button class="btn btn-danger w-100" (click)="logout()">Logout</button>
    </div>
  </div>
</div>
