<div class="auth-wrapper">
  <!-- Left Panel -->
  <div class="auth-left">
    <div class="brand-content">
      <div class="brand-logo">📖</div>
      <h1 class="brand-name">ProfileBook</h1>
      <p class="brand-tagline">Connect. Share. Belong.</p>
      <div class="brand-features">
        <div class="feature-item">🚀 Get started in seconds</div>
        <div class="feature-item">🔒 Secure & private</div>
        <div class="feature-item">🌍 Join a growing community</div>
      </div>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="auth-right">
    <div class="auth-card">
      <h2 class="auth-title">Create account</h2>
      <p class="auth-subtitle">Join ProfileBook today</p>

      <div *ngIf="errorMessage" class="auth-error">
        <span>⚠️</span> {{ errorMessage }}
      </div>

      <div class="form-group">
        <label class="form-label">Username</label>
        <!-- appAutofocus: username is the first field on the form so the cursor goes here,
             the user can start typing their name without clicking anything first -->
        <!-- appTrimInput: strips accidental spaces so " john " and "john" register as the
             same username — avoids duplicate-looking accounts that differ only in whitespace -->
        <input type="text" class="auth-input"
          [(ngModel)]="username"
          appAutofocus
          appTrimInput
          placeholder="Choose a username"/>
      </div>

      <div class="form-group">
        <label class="form-label">Email address</label>
        <!-- appTrimInput on email only — same reason as login: email addresses don't have
             meaningful leading/trailing spaces, so we clean them silently on blur -->
        <input type="email" class="auth-input"
          [(ngModel)]="email"
          appTrimInput
          placeholder="you@example.com"/>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <!-- appPasswordToggle injects the eye-icon button at runtime via Renderer2 —
             no extra wrapper div needed in the template, the directive builds the DOM itself.
             No appTrimInput here — passwords with intentional spaces must be preserved exactly,
             silently trimming them would cause login failures the user can't diagnose -->
        <input type="password" class="auth-input"
          [(ngModel)]="password"
          appPasswordToggle
          placeholder="Min. 6 characters"/>
      </div>

      <button class="auth-btn" (click)="register()">
        Create Account →
      </button>

      <p class="auth-switch">
        Already have an account?
        <a routerLink="/login" class="auth-link">Sign in</a>
      </p>
    </div>
  </div>
</div>
