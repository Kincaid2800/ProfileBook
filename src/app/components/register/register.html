<div class="auth-wrapper">
  <!-- Left Panel -->
  <div class="auth-left">
    <div class="brand-content">
      <div class="brand-logo">📖</div>
      <h1 class="brand-name">ProfileBook</h1>
      <p class="brand-tagline">Connect. Share. Belong.</p>
      <div class="brand-features">
        <div class="feature-item">🚀 Get started in seconds</div>
        <div class="feature-item">🔒 Secure & private</div>
        <div class="feature-item">🌍 Join a growing community</div>
      </div>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="auth-right">
    <div class="auth-card">
      <h2 class="auth-title">Create account</h2>
      <p class="auth-subtitle">Join ProfileBook today</p>

      <div *ngIf="errorMessage" class="auth-error">
        <span>⚠️</span> {{ errorMessage }}
      </div>

      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" class="auth-input"
          [(ngModel)]="username"
          placeholder="Choose a username"/>
      </div>

      <div class="form-group">
        <label class="form-label">Email address</label>
        <input type="email" class="auth-input"
          [(ngModel)]="email"
          placeholder="you@example.com"/>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="auth-input"
          [(ngModel)]="password"
          placeholder="Min. 6 characters"/>
      </div>

      <button class="auth-btn" (click)="register()">
        Create Account →
      </button>

      <p class="auth-switch">
        Already have an account?
        <a routerLink="/login" class="auth-link">Sign in</a>
      </p>
    </div>
  </div>
</div>
