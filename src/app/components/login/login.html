<div class="auth-wrapper">
  <!-- Left Panel -->
  <div class="auth-left">
    <div class="brand-content">
      <div class="brand-logo">📖</div>
      <h1 class="brand-name">ProfileBook</h1>
      <p class="brand-tagline">Connect. Share. Belong.</p>
      <div class="brand-features">
        <div class="feature-item">✨ Share posts with the world</div>
        <div class="feature-item">💬 Message your friends</div>
        <div class="feature-item">👥 Join groups you love</div>
      </div>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="auth-right">
    <div class="auth-card">
      <h2 class="auth-title">Welcome back</h2>
      <p class="auth-subtitle">Sign in to your account</p>

      <div *ngIf="errorMessage" class="auth-error">
        <span>⚠️</span> {{ errorMessage }}
      </div>

      <div class="form-group">
        <label class="form-label">Email address</label>
        <!-- appAutofocus: cursor lands here on page load — login is the first thing users do,
             no point making them click into the field before they can type their email -->
        <!-- appTrimInput: fires on blur so "  user@site.com  " is cleaned to "user@site.com"
             before validate() runs its regex check — prevents false "invalid email" rejections -->
        <input type="email" class="auth-input"
          [(ngModel)]="email"
          appAutofocus
          appTrimInput
          placeholder="you@example.com"/>
      </div>

      <div class="form-group">
        <label class="form-label">Password</label>
        <!-- appPasswordToggle injects the eye-icon button at runtime via Renderer2 —
             no extra wrapper div needed in the template, the directive builds the DOM itself.
             No appTrimInput here — passwords with intentional spaces must be preserved exactly. -->
        <input type="password" class="auth-input"
          [(ngModel)]="password"
          appPasswordToggle
          placeholder="Enter your password"
          (keyup.enter)="login()"/>
      </div>

      <button class="auth-btn" (click)="login()">
        Sign In →
      </button>

      <p class="auth-switch">
        Don't have an account?
        <a routerLink="/register" class="auth-link">Create one</a>
      </p>
    </div>
  </div>
</div>
